<svg
  width="520"
  height="220"
  viewBox="0 0 520 220"
  xmlns="http://www.w3.org/2000/svg"
  role="img"
  aria-label="VOXBOUND logo - The world responds to your voice"
>
  <!-- Background -->
  <rect width="100%" height="100%" fill="#0b0e14" />

  <!-- Icon Container -->
  <g transform="translate(40,40)">
    <!-- System Boundary -->
    <rect
      x="0"
      y="0"
      width="120"
      height="120"
      rx="16"
      ry="16"
      fill="none"
      stroke="#00f2ff"
      stroke-width="4"
    />

    <!-- Bound Waveform -->
    <g transform="translate(60,60)" stroke="#00f2ff" stroke-width="4" stroke-linecap="round">
      <line x1="0" y1="-36" x2="0" y2="36" />
      <line x1="-14" y1="-22" x2="-14" y2="22" />
      <line x1="14" y1="-22" x2="14" y2="22" />
      <line x1="-28" y1="-10" x2="-28" y2="10" />
      <line x1="28" y1="-10" x2="28" y2="10" />
    </g>
  </g>

  <!-- Wordmark -->
  <text
    x="200"
    y="105"
    fill="#00f2ff"
    font-size="42"
    font-family="JetBrains Mono, monospace"
    font-weight="700"
    letter-spacing="3"
  >
    VOXBOUND
  </text>

  <!-- Tagline -->
  <text
    x="202"
    y="145"
    fill="#f9f933"
    font-size="14"
    font-family="JetBrains Mono, monospace"
    letter-spacing="2"
  >
    THE WORLD RESPONDS TO YOUR VOICE
  </text>
</svg>